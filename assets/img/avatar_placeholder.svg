<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#4a90d9" rx="8"/>
  <!-- Body -->
  <ellipse cx="100" cy="160" rx="55" ry="35" fill="#2c5f8a"/>
  <!-- Head -->
  <circle cx="100" cy="80" r="38" fill="#f0c8a0"/>
  <!-- Hair -->
  <ellipse cx="100" cy="50" rx="38" ry="18" fill="#2d2d2d"/>
  <rect x="62" y="50" width="76" height="18" fill="#2d2d2d"/>
  <!-- Glasses frame left -->
  <rect x="70" y="76" width="24" height="16" rx="4" fill="none" stroke="#333" stroke-width="2.5"/>
  <!-- Glasses frame right -->
  <rect x="106" y="76" width="24" height="16" rx="4" fill="none" stroke="#333" stroke-width="2.5"/>
  <!-- Glasses bridge -->
  <line x1="94" y1="84" x2="106" y2="84" stroke="#333" stroke-width="2.5"/>
  <!-- Smile -->
  <path d="M 86 100 Q 100 112 114 100" fill="none" stroke="#c07050" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Shoulders / shirt collar -->
  <path d="M 55 145 Q 100 130 145 145" fill="#3a6ea8" stroke="none"/>
  <!-- Lab coat / shirt -->
  <rect x="55" y="145" width="90" height="50" fill="#e8ecf0" rx="4"/>
  <line x1="100" y1="145" x2="100" y2="195" stroke="#ccc" stroke-width="1.5"/>
</svg>
